<!DOCTYPE html>
<html>
<head>
    <title>AgriVision Login</title>

    <!-- ✅ FIXED SUPABASE SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#0b0f14; color:#00ff88; text-align:center; font-family:Arial;">

<h1>AgriVision Login</h1>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

<p id="status"></p>

<br><br>

<a href="index.html">
    <button>Back</button>
</a>

<script>

// ✅ REPLACE THESE WITH YOUR REAL KEYS
const SUPABASE_URL = "https://fmrdvvtawadbcrglsbnj.supabase.co/rest/v1/";
const SUPABASE_KEY = "sb_publishable_IvVJOGaqKo7pUkRNVlb4_w_15agKRTG";

// ✅ CREATE CLIENT (THIS WAS YOUR PROBLEM BEFORE)
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


// ✅ SIGN UP
async function signup() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let { error } = await client.auth.signUp({
        email: email,
        password: password
    });

    if (error) {
        document.getElementById("status").innerText = error.message;
    } else {
        document.getElementById("status").innerText = "Account created ✅";
    }
}


// ✅ LOGIN
async function login() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let { error } = await client.auth.signInWithPassword({
        email: email,
        password: password
    });

    if (error) {
        document.getElementById("status").innerText = error.message;
    } else {
        window.location.href = "dashboard.html";
    }
}

</script>

</body>
</html>
