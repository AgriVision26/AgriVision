<!DOCTYPE html>
<html>
<head>
    <title>AgriVision</title>
</head>

<body style="margin:0; background:black; color:#00ff88; font-family:Arial; text-align:center;">

<!-- ✅ FIXED LOGO -->
<img src="https://raw.githubusercontent.com/AgriVision26/AgriVision/main/logo.png"
     style="width:200px; margin-top:20px;">

<h2>AgriVision Crop Intelligence</h2>

<div style="position:relative; display:inline-block;">
    <video id="video" width="500" autoplay playsinline muted></video>

    <canvas id="overlay"
        style="position:absolute; top:0; left:0; pointer-events:none;">
    </canvas>
</div>

<br><br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="scanFrame()">Scan Frame</button>

<br><br>

<p id="status">System Ready</p>

<div id="questions" style="margin-top:20px;"></div>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("overlay");
let ctx = canvas.getContext("2d");

const BACKEND_URL = "https://agrivision-p5m7.onrender.com/analyze";

let currentIssue = "";
let step = 0;
let confidence = 0;

// CAMERA
async function startCamera() {
    document.getElementById("status").innerText = "Starting camera...";

    try {
        let stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;
        await video.play();

        document.getElementById("status").innerText = "Camera ready ✅";
    } catch {
        document.getElementById("status").innerText = "Camera FAILED";
    }
}

// SCAN
function scanFrame() {

    if (!video.srcObject) {
        alert("Start camera first");
        return;
    }

    let tempCanvas = document.createElement("canvas");
    let tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;

    tempCtx.drawImage(video, 0, 0);

    tempCanvas.toBlob(blob => {

        let formData = new FormData();
        formData.append("file", blob);

        document.getElementById("status").innerText = "Analyzing...";

        fetch(BACKEND_URL, {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            drawBoxes(data.detections);

            currentIssue = data.detections[0].issue;
            confidence = Math.floor(data.detections[0].confidence * 100);

            step = 1;
            askQuestion();
        });

    }, "image/jpeg");
}

// DRAW BOXES
function drawBoxes(detections) {

    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    detections.forEach(d => {

        let scaleX = canvas.width / video.videoWidth;
        let scaleY = canvas.height / video.videoHeight;

        let x = d.bbox[0] * scaleX;
        let y = d.bbox[1] * scaleY;
        let w = (d.bbox[2] - d.bbox[0]) * scaleX;
        let h = (d.bbox[3] - d.bbox[1]) * scaleY;

        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);

        ctx.fillStyle = "#00ff88";
        ctx.font = "14px Arial";

        ctx.fillText(
            d.issue + " (" + Math.floor(d.confidence * 100) + "%)",
            x,
            y - 5
        );
    });
}

// QUESTIONS
function askQuestion() {

    let qDiv = document.getElementById("questions");
    qDiv.innerHTML = "";

    let container = document.createElement("div");

    container.style.border = "2px solid #00ff88";
    container.style.padding = "20px";
    container.style.margin = "10px";

    if (step === 1) {
        container.innerHTML = `
            <h3>${currentIssue}</h3>
            <p>Is this affecting multiple leaves?</p>

            <button onclick="nextStep(true)">YES</button>
            <button onclick="nextStep(false)">NO</button>
        `;
    }

    else if (step === 2) {
        container.innerHTML = `
            <p>Have you recently changed nutrients?</p>

            <button onclick="nextStep(true)">YES</button>
            <button onclick="nextStep(false)">NO</button>
        `;
    }

    else if (step === 3) {

        let recommendation = "";

        if (currentIssue === "Chlorosis") {
            recommendation = "Likely nitrogen deficiency. Adjust nutrients.";
        }
        else if (currentIssue === "Leaf Burn") {
            recommendation = "Possible overfeeding or light stress.";
        }
        else {
            recommendation = "Further inspection required.";
        }

        container.innerHTML = `
            <h2>Final Diagnosis ✅</h2>

            <p><b>Issue:</b> ${currentIssue}</p>
            <p><b>Confidence:</b> ${confidence}%</p>

            <p><b>Recommendation:</b></p>
            <p>${recommendation}</p>

            <br>
            <button onclick="resetApp()">Scan Again</button>
        `;
    }

    qDiv.appendChild(container);
}

// CONFIDENCE
function nextStep(answer) {

    if (step === 1) {
        confidence = answer ? confidence + 10 : confidence - 5;
        step = 2;
    }

    else if (step === 2) {
        confidence = answer ? confidence + 5 : confidence - 5;
        step = 3;
    }

    if (confidence > 100) confidence = 100;
    if (confidence < 0) confidence = 0;

    askQuestion();
}

// RESET
function resetApp() {

    document.getElementById("questions").innerHTML = "";
    document.getElementById("status").innerText = "Ready for next scan";
}

</script>

</body>
</html>
