<!DOCTYPE html>
<html>
<head>
    <title>AgriVision</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            background:#0b0f14;
            color:#00ff88;
            font-family:Arial;
            text-align:center;
        }

        .container {
            max-width: 600px;
            margin:auto;
            padding:20px;
        }

        .card {
            background:#111820;
            border-radius:15px;
            padding:20px;
            margin-top:15px;
            box-shadow:0 0 20px rgba(0,255,136,0.1);
        }

        button {
            background:#00ff88;
            color:black;
            border:none;
            padding:10px 20px;
            margin:5px;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover {
            background:#00cc6a;
        }

        video {
            border-radius:15px;
            width:100%;
        }

        canvas {
            border-radius:15px;
        }
    </style>

</head>

<body>

<div class="container">

<!-- ✅ LOGO -->
<img src="https://raw.githubusercontent.com/AgriVision26/AgriVision/main/logo.png"
     style="width:160px; margin-bottom:10px;">

<h2>AgriVision AI Scanner</h2>

<div style="position:relative; display:inline-block; width:100%;">
    <video id="video" autoplay playsinline muted></video>

    <canvas id="overlay"
        style="position:absolute; top:0; left:0; pointer-events:none; width:100%;">
    </canvas>
</div>

<div class="card">

<button onclick="startCamera()">Start Camera</button>

<p id="status">System Ready</p>

</div>

<div id="questions"></div>

</div>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("overlay");
let ctx = canvas.getContext("2d");

const BACKEND_URL = "https://agrivision-p5m7.onrender.com/analyze";

let scanning = false;
let currentIssue = "";
let confidence = 0;
let step = 0;


// ✅ START CAMERA
async function startCamera() {

    document.getElementById("status").innerText = "Starting camera...";

    try {
        let stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;
        await video.play();

        document.getElementById("status").innerText = "Live scanning ✅";

        scanning = true;
        autoScan();

    } catch {
        document.getElementById("status").innerText = "Camera FAILED";
    }
}


// ✅ AUTO SCAN
function autoScan() {

    if (!scanning) return;

    scanFrame();

    setTimeout(autoScan, 2000);
}


// ✅ SCAN
function scanFrame() {

    let tempCanvas = document.createElement("canvas");
    let tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;

    tempCtx.drawImage(video, 0, 0);

    tempCanvas.toBlob(blob => {

        let formData = new FormData();
        formData.append("file", blob);

        fetch(BACKEND_URL, {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            if (!data.detections || data.detections.length === 0) return;

            drawBoxes(data.detections);

            currentIssue = data.detections[0].issue;
            confidence = Math.floor(data.detections[0].confidence * 100);

        });

    }, "image/jpeg");
}


// ✅ DRAW BOXES
function drawBoxes(detections) {

    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    detections.forEach(d => {

        let scaleX = canvas.width / video.videoWidth;
        let scaleY = canvas.height / video.videoHeight;

        let x = d.bbox[0] * scaleX;
        let y = d.bbox[1] * scaleY;
        let w = (d.bbox[2] - d.bbox[0]) * scaleX;
        let h = (d.bbox[3] - d.bbox[1]) * scaleY;

        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);

        ctx.fillStyle = "#00ff88";
        ctx.font = "12px Arial";

        ctx.fillText(
            d.issue + " (" + Math.floor(d.confidence * 100) + "%)",
            x,
            y - 5
        );
    });
}


// ✅ TAP CAMERA TO ASK QUESTIONS
video.addEventListener("click", () => {

    if (!currentIssue) return;

    step = 1;
    askQuestion();
});


// ✅ QUESTION FLOW
function askQuestion() {

    let qDiv = document.getElementById("questions");
    qDiv.innerHTML = "";

    let card = document.createElement("div");
    card.className = "card";

    if (step === 1) {
        card.innerHTML = `
            <h3>${currentIssue}</h3>
            <p>Is this affecting multiple leaves?</p>

            <button onclick="nextStep(true)">YES</button>
            <button onclick="nextStep(false)">NO</button>
        `;
    }

    else if (step === 2) {
        card.innerHTML = `
            <p>Have you recently changed nutrients?</p>

            <button onclick="nextStep(true)">YES</button>
            <button onclick="nextStep(false)">NO</button>
        `;
    }

    else if (step === 3) {

        let recommendation = "";

        if (currentIssue === "Chlorosis") {
            recommendation = "Likely nitrogen deficiency. Adjust nutrients.";
        }
        else if (currentIssue === "Leaf Burn") {
            recommendation = "Possible overfeeding or light stress.";
        }
        else {
            recommendation = "Further inspection required.";
        }

        card.innerHTML = `
            <h2>Diagnosis ✅</h2>

            <p><b>Issue:</b> ${currentIssue}</p>
            <p><b>Confidence:</b> ${confidence}%</p>

            <p>${recommendation}</p>

            <button onclick="resetFlow()">Close</button>
        `;
    }

    qDiv.appendChild(card);
}


// ✅ CONFIDENCE UPDATE
function nextStep(answer) {

    if (step === 1) {
        confidence = answer ? confidence + 10 : confidence - 5;
        step = 2;
    }
    else if (step === 2) {
        confidence = answer ? confidence + 5 : confidence - 5;
        step = 3;
    }

    if (confidence > 100) confidence = 100;
    if (confidence < 0) confidence = 0;

    askQuestion();
}


// ✅ RESET
function resetFlow() {
    document.getElementById("questions").innerHTML = "";
}

</script>

</body>
</html>
