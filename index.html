<!DOCTYPE html>
<html>
<head>
    <title>AgriVision</title>
</head>

<body style="margin:0; background:black; color:#00ff88; font-family:Arial; text-align:center;">

<h2>AgriVision Crop Intelligence</h2>

<!-- CAMERA -->
<div style="position:relative; display:inline-block;">
    <video id="video" width="500" autoplay playsinline muted></video>

    <canvas id="overlay"
        style="position:absolute; top:0; left:0; pointer-events:none;">
    </canvas>
</div>

<br><br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="scanFrame()">Scan Frame</button>

<br><br>

<p id="status">System Ready</p>

<!-- QUESTIONS / RESULTS -->
<div id="questions" style="margin-top:20px;"></div>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("overlay");
let ctx = canvas.getContext("2d");

const BACKEND_URL = "https://agrivision-p5m7.onrender.com/analyze";

// ✅ START CAMERA
async function startCamera() {

    document.getElementById("status").innerText = "Starting camera...";

    try {
        let stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: false
        });

        video.srcObject = stream;
        await video.play();

        document.getElementById("status").innerText = "Camera ready ✅";

    } catch (err) {
        document.getElementById("status").innerText =
            "Camera FAILED";
    }
}

// ✅ SCAN FRAME
function scanFrame() {

    if (!video.srcObject) {
        alert("Start camera first");
        return;
    }

    let tempCanvas = document.createElement("canvas");
    let tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;

    tempCtx.drawImage(video, 0, 0);

    tempCanvas.toBlob(blob => {

        let formData = new FormData();
        formData.append("file", blob);

        document.getElementById("status").innerText = "Analyzing...";

        fetch(BACKEND_URL, {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            drawBoxes(data.detections);
            showQuestions(data.detections);

            document.getElementById("status").innerText =
                "Detected " + data.detections.length + " issue(s)";

        });

    }, "image/jpeg");
}


// ✅ DRAW BOXES
function drawBoxes(detections) {

    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    detections.forEach(d => {

        let scaleX = canvas.width / video.videoWidth;
        let scaleY = canvas.height / video.videoHeight;

        let x = d.bbox[0] * scaleX;
        let y = d.bbox[1] * scaleY;
        let w = (d.bbox[2] - d.bbox[0]) * scaleX;
        let h = (d.bbox[3] - d.bbox[1]) * scaleY;

        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);

        ctx.fillStyle = "#00ff88";
        ctx.font = "14px Arial";

        ctx.fillText(
            d.issue + " (" + Math.floor(d.confidence * 100) + "%)",
            x,
            y - 5
        );
    });
}


// ✅ SHOW QUESTIONS
function showQuestions(detections) {

    let qDiv = document.getElementById("questions");
    qDiv.innerHTML = "";

    detections.forEach(d => {

        let block = document.createElement("div");

        block.style.border = "1px solid #00ff88";
        block.style.margin = "10px";
        block.style.padding = "10px";

        block.innerHTML = `
            <h3>${d.issue}</h3>
            <p>Is this affecting multiple leaves?</p>

            <button onclick="answer('${d.issue}', 'YES')">YES</button>
            <button onclick="answer('${d.issue}', 'NO')">NO</button>
        `;

        qDiv.appendChild(block);
    });
}


// ✅ HANDLE ANSWER (THIS IS THE FIX)
function answer(issue, response) {

    let qDiv = document.getElementById("questions");
    qDiv.innerHTML = "";

    let result = document.createElement("div");

    result.style.border = "2px solid #00ff88";
    result.style.margin = "20px";
    result.style.padding = "20px";

    let recommendation = "";

    if (issue === "Chlorosis") {
        recommendation = (response === "YES")
            ? "High likelihood nutrient deficiency. Check nitrogen levels."
            : "Minor chlorosis. Monitor plant.";
    }

    else if (issue === "Leaf Burn") {
        recommendation = (response === "YES")
            ? "Possible overfeeding. Reduce nutrients."
            : "Localized burn. Check lighting.";
    }

    else {
        recommendation = "Further inspection recommended.";
    }

    result.innerHTML = `
        <h2>Diagnosis Result ✅</h2>

        <p><b>Issue:</b> ${issue}</p>
        <p><b>Your Answer:</b> ${response}</p>

        <p><b>Recommendation:</b></p>
        <p>${recommendation}</p>

        <br>
        <button onclick="resetApp()">Scan Again</button>
    `;

    qDiv.appendChild(result);
}


// ✅ RESET SYSTEM
function resetApp() {
    document.getElementById("questions").innerHTML = "";
    document.getElementById("status").innerText = "Ready for next scan";
}

</script>

</body>
</html>
