<!DOCTYPE html>
<html>
<head>
    <title>AgriVision</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            background:#0b0f14;
            color:#00ff88;
            font-family:Arial;
            text-align:center;
        }

        /* ✅ FIXED TOP SECTION */
        .top-bar {
            padding:15px;
        }

        .top-bar img {
            width:140px;
            display:block;
            margin:auto;
        }

        video {
            width:100%;
            max-height:60vh;
            object-fit:cover;
            border-radius:15px;
        }

        canvas {
            position:absolute;
            top:0;
            left:0;
            width:100%;
            max-height:60vh;
            pointer-events:none;
        }

        .controls {
            margin:10px;
        }

        button {
            background:#00ff88;
            color:black;
            border:none;
            padding:12px 25px;
            border-radius:10px;
            font-size:16px;
        }

        .card {
            margin:10px;
            background:#111820;
            padding:15px;
            border-radius:15px;
        }
    </style>

</head>

<body>

<!-- ✅ FIXED LOGO (CENTERED) -->
<div class="top-bar">
    
</div>

<h2>AgriVision AI Scanner</h2>

<!-- ✅ CAMERA -->
<div style="position:relative;">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
</div>

<!-- ✅ CONTROLS -->
<div class="controls">
    <button id="startBtn" onclick="startCamera()">Start Camera</button>
    <p id="status">Ready</p>
</div>

<!-- ✅ QUESTIONS -->
<div id="questions"></div>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("overlay");
let ctx = canvas.getContext("2d");

let startBtn = document.getElementById("startBtn");

const BACKEND_URL = "https://agrivision-p5m7.onrender.com/analyze";

let scanning = false;
let currentIssue = "";
let confidence = 0;
let step = 0;


// ✅ START CAMERA
async function startCamera() {

    startBtn.style.display = "none";

    document.getElementById("status").innerText = "Starting...";

    try {
        let stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;
        await video.play();

        document.getElementById("status").innerText = "Live ✅";

        scanning = true;
        autoScan();

    } catch {
        document.getElementById("status").innerText = "Camera error";
    }
}


// ✅ AUTO SCAN
function autoScan() {

    if (!scanning) return;

    scanFrame();

    setTimeout(autoScan, 2000);
}


// ✅ SCAN
function scanFrame() {

    let tempCanvas = document.createElement("canvas");
    let tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;

    tempCtx.drawImage(video, 0, 0);

    tempCanvas.toBlob(blob => {

        let formData = new FormData();
        formData.append("file", blob);

        fetch(BACKEND_URL, {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            if (!data.detections || data.detections.length === 0) return;

            drawBoxes(data.detections);

            currentIssue = data.detections[0].issue;
            confidence = Math.floor(data.detections[0].confidence * 100);

        });

    }, "image/jpeg");
}


// ✅ DRAW
function drawBoxes(detections) {

    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    detections.forEach(d => {

        let scaleX = canvas.width / video.videoWidth;
        let scaleY = canvas.height / video.videoHeight;

        let x = d.bbox[0] * scaleX;
        let y = d.bbox[1] * scaleY;
        let w = (d.bbox[2] - d.bbox[0]) * scaleX;
        let h = (d.bbox[3] - d.bbox[1]) * scaleY;

        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);

        ctx.fillStyle = "#00ff88";
        ctx.font = "12px Arial";

        ctx.fillText(
            d.issue + " (" + Math.floor(d.confidence * 100) + "%)",
            x,
            y - 5
        );
    });
}


// ✅ TAP QUESTIONS
video.addEventListener("click", () => {

    if (!currentIssue) return;

    step = 1;
    askQuestion();
});


// ✅ QUESTIONS
function askQuestion() {

    let qDiv = document.getElementById("questions");

    let card = document.createElement("div");
    card.className = "card";

    if (step === 1) {
        card.innerHTML = `
            <h3>${currentIssue}</h3>
            <p>Affects multiple leaves?</p>

            <button onclick="nextStep(true)">YES</button>
            <button onclick="nextStep(false)">NO</button>
        `;
    }

    else if (step === 2) {
        card.innerHTML = `
            <p>Nutrient change recently?</p>

            <button onclick="nextStep(true)">YES</button>
            <button onclick="nextStep(false)">NO</button>
        `;
    }

    else if (step === 3) {

        let rec = currentIssue === "Chlorosis"
            ? "Check nitrogen"
            : currentIssue === "Leaf Burn"
            ? "Reduce nutrients/light"
            : "Inspect further";

        card.innerHTML = `
            <h3>Diagnosis ✅</h3>
            <p>${currentIssue}</p>
            <p>${confidence}% confidence</p>
            <p>${rec}</p>

            <button onclick="resetFlow()">Close</button>
        `;
    }

    qDiv.innerHTML = "";
    qDiv.appendChild(card);
}


// ✅ CONFIDENCE
function nextStep(answer) {

    if (step === 1) {
        confidence += answer ? 10 : -5;
        step = 2;
    }
    else if (step === 2) {
        confidence += answer ? 5 : -5;
        step = 3;
    }

    if (confidence > 100) confidence = 100;
    if (confidence < 0) confidence = 0;

    askQuestion();
}


// ✅ RESET
function resetFlow() {
    document.getElementById("questions").innerHTML = "";
}

</script>

</body>
</html>
