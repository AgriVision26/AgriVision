<!DOCTYPE html>
<html>
<head>
    <title>AgriVision Scanner</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ CORRECT SUPABASE SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            margin:0;
            background:#0b0f14;
            color:#00ff88;
            font-family:Arial;
            text-align:center;
        }

        .top-bar {
            position:sticky;
            top:0;
            background:#0b0f14;
            padding:15px;
            z-index:1000;
        }

        .logo {
            width:100px;
            display:block;
            margin:0 auto 10px auto;
        }

        button {
            margin:5px;
            padding:10px 15px;
            border:none;
            border-radius:8px;
            background:#00ff88;
            color:black;
            font-weight:bold;
        }

        video {
            width:100%;
            max-height:50vh;
            object-fit:cover;
        }

        canvas {
            position:absolute;
            top:0;
            left:0;
            width:100%;
            pointer-events:none;
        }

        .issue-card {
            background:#111820;
            padding:10px;
            margin:5px;
            border-radius:10px;
        }
    </style>
</head>

<body>

<!-- ✅ TOP BAR WITH LOGO -->
<div class="top-bar">

    <!-- ✅ YOUR LOGO (CHANGE VERSION NUMBER IF NEEDED) -->
    <img src="https://raw.githubusercontent.com/AgriVision26/AgriVision/main/logo.png?v=2" class="logo">

    <!-- ✅ NAVIGATION -->
    <a href="dashboard.html">
        <button>⬅ Dashboard</button>
    </a>

    <button onclick="startCamera()">Start</button>
    <button onclick="stopCamera()">Stop</button>

    <button onclick="logout()">Logout</button>

    <p id="status">Ready</p>

</div>

<!-- ✅ CAMERA -->
<div style="position:relative;">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
</div>

<!-- ✅ RESULTS -->
<div id="issues"></div>

<script>

// ✅ SUPABASE CONFIG
const SUPABASE_URL = "https://fmrdvvtawadbcrglsbnj.supabase.co";
const SUPABASE_KEY = "sb_publishable_IvVJOGaqKo7pUkRNVlb4_w_15agKRTG";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ✅ BACKEND AI API
const BACKEND_URL = "https://agrivision-p5m7.onrender.com/analyze";

let video = document.getElementById("video");
let canvas = document.getElementById("overlay");
let ctx = canvas.getContext("2d");

let stream = null;
let scanning = false;


// ✅ START CAMERA
async function startCamera() {

    document.getElementById("status").innerText = "Starting camera...";

    try {

        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;
        await video.play();

        document.getElementById("status").innerText = "Camera ON ✅";

        scanning = true;
        autoScan();

    } catch (err) {
        console.log(err);
        document.getElementById("status").innerText = "Camera FAILED ❌";
    }
}


// ✅ AUTO SCAN LOOP
function autoScan() {
    if (!scanning) return;

    scanFrame();

    setTimeout(autoScan, 2000);
}


// ✅ SEND FRAME TO AI
function scanFrame() {

    let tempCanvas = document.createElement("canvas");
    let tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;

    tempCtx.drawImage(video, 0, 0);

    tempCanvas.toBlob(blob => {

        let formData = new FormData();
        formData.append("file", blob);

        fetch(BACKEND_URL, {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            if (!data.detections) return;

            drawBoxes(data.detections);
            showIssues(data.detections);

        })
        .catch(err => {
            console.log("API error:", err);
        });

    }, "image/jpeg");
}


// ✅ DRAW DETECTION BOXES
function drawBoxes(detections) {

    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    detections.forEach(d => {

        let x = d.bbox[0];
        let y = d.bbox[1];
        let w = d.bbox[2] - d.bbox[0];
        let h = d.bbox[3] - d.bbox[1];

        ctx.strokeStyle = "#00ff88";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, w, h);
    });
}


// ✅ SHOW RESULTS
function showIssues(detections) {

    let div = document.getElementById("issues");
    div.innerHTML = "";

    detections.forEach(d => {

        let card = document.createElement("div");
        card.className = "issue-card";

        card.innerHTML = `
            <b>${d.issue}</b><br>
            ${Math.floor(d.confidence * 100)}%
        `;

        div.appendChild(card);
    });
}


// ✅ STOP CAMERA
function stopCamera() {

    scanning = false;

    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }

    document.getElementById("status").innerText = "Camera OFF";
}


// ✅ LOGOUT
async function logout() {

    stopCamera();

    await supabaseClient.auth.signOut();

    window.location.href = "index.html";
}

</script>

</body>
</html>
