<!DOCTYPE html>
<html>
<head>
    <title>AgriVision Scanner</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ✅ SUPABASE -->
    https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2script>

    <style>
        body {
            margin:0;
            background:#0b0f14;
            color:#00ff88;
            font-family:Arial;
            text-align:center;
        }

        .top-bar {
            position:sticky;
            top:0;
            background:#0b0f14;
            padding:10px;
            z-index:1000;
        }

        video {
            width:100%;
            max-height:55vh;
            object-fit:cover;
        }

        canvas {
            position:absolute;
            top:0;
            left:0;
            width:100%;
            pointer-events:none;
        }

        button {
            margin:5px;
            padding:10px 15px;
            border:none;
            border-radius:8px;
            background:#00ff88;
            color:black;
            font-weight:bold;
        }

        .issue-card {
            background:#111820;
            margin:5px;
            padding:10px;
            border-radius:10px;
        }

        .question-card {
            background:#111820;
            margin:10px;
            padding:15px;
            border-radius:15px;
        }
    </style>
</head>

<body>

<!-- ✅ TOP BAR -->
<div class="top-bar">

    dashboard.html<button>⬅ Dashboard</button></a>

    <button onclick="startCamera()">Start</button>
    <button onclick="stopCamera()">Stop</button>

    <button onclick="logout()">Logout</button>

    <p id="status">Ready</p>

</div>

<!-- ✅ CAMERA -->
<div style="position:relative;">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
</div>

<!-- ✅ ISSUES -->
<div id="issues"></div>

<!-- ✅ QUESTIONS -->
<div id="questions"></div>

<script>

// ✅ SUPABASE
const SUPABASE_URL = "https://fmrdvvtawadbcrglsbnj.supabase.co";
const SUPABASE_KEY = "sb_publishable_IvVJOGaqKo7pUkRNVlb4_w_15agKRTG";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ✅ BACKEND
const BACKEND_URL = "https://agrivision-p5m7.onrender.com/analyze";

let video = document.getElementById("video");
let canvas = document.getElementById("overlay");
let ctx = canvas.getContext("2d");

let stream = null;
let scanning = false;

let detections = [];
let currentIssue = "";
let confidence = 0;
let step = 0;

// ✅ COLORS
const issueColors = {
    "Chlorosis": "#FFD700",
    "Leaf Burn": "#FF4C4C"
};

function getColor(issue) {
    return issueColors[issue] || "#00ff88";
}


// ✅ START CAMERA
async function startCamera() {

    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });

        video.srcObject = stream;
        await video.play();

        document.getElementById("status").innerText = "Camera ON ✅";

        scanning = true;
        autoScan();

    } catch {
        document.getElementById("status").innerText = "Camera FAILED";
    }
}


// ✅ AUTO SCAN
function autoScan() {

    if (!scanning) return;

    scanFrame();
    setTimeout(autoScan, 2000);
}


// ✅ SCAN FRAME
function scanFrame() {

    let tempCanvas = document.createElement("canvas");
    let tempCtx = tempCanvas.getContext("2d");

    tempCanvas.width = video.videoWidth;
    tempCanvas.height = video.videoHeight;

    tempCtx.drawImage(video, 0, 0);

    tempCanvas.toBlob(blob => {

        let formData = new FormData();
        formData.append("file", blob);

        fetch(BACKEND_URL, {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            if (!data.detections) return;

            detections = data.detections;

            drawBoxes(detections);
            showIssues();

        });

    }, "image/jpeg");
}


// ✅ DRAW BOXES
function drawBoxes(detections) {

    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    detections.forEach(d => {

        let color = getColor(d.issue);

        let x = d.bbox[0];
        let y = d.bbox[1];
        let w = d.bbox[2] - d.bbox[0];
        let h = d.bbox[3] - d.bbox[1];

        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.strokeRect(x, y, w, h);

        ctx.fillStyle = color;
        ctx.fillText(
            d.issue + " (" + Math.floor(d.confidence * 100) + "%)",
            x,
            y - 5
        );
    });
}


// ✅ SHOW ISSUES
function showIssues() {

    let div = document.getElementById("issues");
    div.innerHTML = "";

    detections.forEach(d => {

        let color = getColor(d.issue);
        let conf = Math.floor(d.confidence * 100);

        let card = document.createElement("div");
        card.className = "issue-card";
        card.style.border = "2px solid " + color;

        card.innerHTML = `
            <b style="color:${color}">${d.issue}</b><br>
            ${conf}%<br>
            <button onclick="selectIssue('${d.issue}', ${conf})">Analyze</button>
        `;

        div.appendChild(card);
    });
}


// ✅ SELECT ISSUE
function selectIssue(issue, conf) {
    currentIssue = issue;
    confidence = conf;
    step = 1;
    askQuestion();
}


// ✅ QUESTION FLOW
function askQuestion() {

    let qDiv = document.getElementById("questions");

    let card = document.createElement("div");
    card.className = "question-card";

    if (step === 1) {
        card.innerHTML = `
            <h3>${currentIssue}</h3>
            <p>Affects multiple leaves?</p>
            <button onclick="nextStep(true)">YES</button>
            <button onclick="nextStep(false)">NO</button>
        `;
    }

    else if (step === 2) {
        card.innerHTML = `
            <p>Nutrient change recently?</p>
            <button onclick="nextStep(true)">YES</button>
            <button onclick="nextStep(false)">NO</button>
        `;
    }

    else {

        saveScan(currentIssue, confidence);

        card.innerHTML = `
            <h3>Diagnosis ✅</h3>
            <p>${currentIssue}</p>
            <p>${confidence}% confidence</p>
            <button onclick="resetFlow()">Close</button>
        `;
    }

    qDiv.innerHTML = "";
    qDiv.appendChild(card);
}


// ✅ CONFIDENCE UPDATE
function nextStep(ans) {

    if (step === 1) {
        confidence += ans ? 10 : -5;
        step = 2;
    }

    else {
        confidence += ans ? 5 : -5;
        step = 3;
    }

    confidence = Math.max(0, Math.min(100, confidence));

    askQuestion();
}


// ✅ RESET QUESTIONS
function resetFlow() {
    document.getElementById("questions").innerHTML = "";
}


// ✅ STOP CAMERA
function stopCamera() {

    scanning = false;

    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }

    document.getElementById("status").innerText = "Camera OFF";
}


// ✅ LOGOUT
async function logout() {

    stopCamera();

    await supabaseClient.auth.signOut();
    window.location.href = "index.html";
}


// ✅ SAVE SCAN TO DATABASE
async function saveScan(issue, conf) {

    let { data } = await supabaseClient.auth.getUser();

    if (!data.user) return;

    await supabaseClient.from("scans").insert([
        {
            user_id: data.user.id,
            issue: issue,
            confidence: conf
        }
    ]);
}

</script>

</body>
</html>
